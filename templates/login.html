<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Wallet Live</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --border: #d1d5db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-container {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .subtitle {
        margin-bottom: 24px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 1rem;
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 16px 0 20px;
        font-size: 0.95rem;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }

      .forgot,
      .footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      .forgot:hover,
      .footer a:hover {
        text-decoration: underline;
      }

      button {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      button:hover {
        background: var(--primary-hover);
      }

      .footer {
        margin-top: 20px;
        text-align: center;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="login-container">
      <h1>Entrar na plataforma</h1>
      <p class="subtitle">
        Acesse sua conta para continuar gerenciando suas informações com
        segurança.
      </p>

      <form action="#" method="post">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seuemail@exemplo.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Digite sua senha"
            required
          />
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" name="remember" />
            Lembrar-me
          </label>
          <a class="forgot" href="#">Esqueceu a senha?</a>
        </div>

        <button type="submit">Entrar</button>
      </form>

      <p class="footer">Não tem uma conta? <a href="#">Criar conta</a></p>
    </main>
  </body>
</html>
