<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar conta | Wallet Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Manrope", "sans-serif"],
            },
            colors: {
              ink: "#0f172a",
              ocean: "#0f6efd",
              skyline: "#8bd7ff",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-950 font-sans text-slate-100">
    <div class="relative isolate min-h-screen overflow-hidden">
      <div
        class="absolute inset-0 bg-[radial-gradient(1000px_500px_at_10%_-10%,rgba(139,215,255,0.35),transparent),radial-gradient(800px_500px_at_90%_120%,rgba(15,110,253,0.45),transparent),linear-gradient(160deg,#020617_0%,#0f172a_40%,#082f49_100%)]"
      ></div>

      <main
        class="relative mx-auto flex min-h-screen w-full max-w-6xl items-center px-6 py-10 sm:px-10"
      >
        <section class="hidden w-1/2 pr-10 lg:block">
          <p
            class="mb-5 inline-flex rounded-full border border-white/20 bg-white/5 px-4 py-1.5 text-xs font-semibold uppercase tracking-[0.24em] text-skyline"
          >
            Wallet Live
          </p>
          <h1
            class="max-w-lg text-4xl font-extrabold leading-tight text-white xl:text-5xl"
          >
            Crie sua conta para começar a organizar suas finanças.
          </h1>
          <p class="mt-5 max-w-md text-base leading-relaxed text-slate-300">
            O cadastro salva seu usuário no banco de dados e libera o acesso ao
            painel da aplicação.
          </p>
        </section>

        <section class="w-full lg:w-1/2">
          <div
            class="mx-auto w-full max-w-md rounded-3xl border border-white/15 bg-white/95 p-7 text-ink shadow-2xl shadow-black/30 backdrop-blur sm:p-9"
          >
            <div class="mb-7">
              <p
                class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500"
              >
                Cadastro
              </p>
              <h2 class="mt-2 text-3xl font-extrabold text-slate-900">
                Criar conta
              </h2>
              <p class="mt-2 text-sm leading-relaxed text-slate-600">
                Preencha seu usuário e senha para registrar uma nova conta.
              </p>
            </div>

            <form action="/register" method="post" class="space-y-5">
              <div>
                <label
                  for="username"
                  class="mb-2 block text-sm font-semibold text-slate-700"
                  >Usuário</label
                >
                <input
                  type="text"
                  id="username"
                  name="username"
                  placeholder="Digite seu usuário"
                  required
                  class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-ocean focus:ring-4 focus:ring-blue-100"
                />
              </div>

              <div>
                <label
                  for="password"
                  class="mb-2 block text-sm font-semibold text-slate-700"
                  >Senha</label
                >
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Digite sua senha"
                  required
                  class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-ocean focus:ring-4 focus:ring-blue-100"
                />
              </div>

              <button
                type="submit"
                class="inline-flex w-full items-center justify-center rounded-xl bg-ocean px-4 py-3 text-sm font-bold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200"
              >
                Registrar
              </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-600">
              Já tem uma conta?
              <a
                href="/login"
                class="font-semibold text-ocean hover:text-blue-700"
                >Entrar</a
              >
            </p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
